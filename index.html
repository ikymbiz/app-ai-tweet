<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Chat & Tweet</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Marked.js -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- PWA Manifest -->
    <link rel="manifest" href='data:application/manifest+json,{"name":"AI Chat & Tweet","short_name":"AI Chat","display":"standalone","background_color":"#ffffff","theme_color":"#3b82f6"}'>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#3b82f6', secondary: '#10b981', twitter: '#1DA1F2' }
                }
            }
        }
    </script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f9fafb; overflow: hidden; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Markdown Styles */
        .prose pre { background: #1f2937; color: #f3f4f6; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin-top: 0.5rem; margin-bottom: 0.5rem; }
        .prose code { background: #e5e7eb; padding: 0.2rem 0.4rem; border-radius: 0.25rem; font-size: 0.875em; }
        .prose p { margin-bottom: 0.5rem; }
        .prose ul, .prose ol { margin-left: 1.5rem; margin-bottom: 0.5rem; }
        .prose ul { list-style-type: disc; }
        
        /* Loading Animation */
        .typing-indicator span { display: inline-block; width: 6px; height: 6px; background-color: #9ca3af; border-radius: 50%; margin: 0 2px; animation: bounce 1.4s infinite ease-in-out both; }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        /* Transitions */
        .slide-in { animation: slideIn 0.3s forwards; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        
        .toast-enter { animation: fadeUp 0.3s forwards; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px) translateX(-50%); } to { opacity: 1; transform: translateY(0) translateX(-50%); } }
    </style>
</head>
<body class="flex flex-col h-screen h-[100dvh]">

    <!-- Header -->
    <header class="bg-white shadow-sm z-10 flex justify-between items-center px-4 py-3 shrink-0">
        <div class="flex items-center gap-3">
            <button id="btn-sidebar-toggle" class="text-gray-600 hover:text-primary text-xl p-2 rounded-full transition-colors"><i class="fas fa-bars"></i></button>
            <h1 class="text-lg font-bold text-gray-800 tracking-tight">AI Chat <span class="text-twitter">& Tweet</span></h1>
        </div>
        <button id="btn-settings-toggle" class="text-gray-600 hover:text-primary text-xl p-2 rounded-full transition-colors"><i class="fas fa-cog"></i></button>
    </header>

    <!-- Main Container -->
    <div class="flex flex-1 overflow-hidden relative">
        
        <!-- Sidebar (History) -->
        <aside id="sidebar" class="absolute inset-y-0 left-0 w-72 bg-gray-50 border-r shadow-lg transform -translate-x-full transition-transform duration-300 z-20 flex flex-col">
            <div class="p-4 border-b bg-white flex justify-between items-center">
                <h2 class="font-bold text-gray-700">履歴管理</h2>
                <button id="btn-sidebar-close" class="text-gray-500 hover:text-red-500 p-1"><i class="fas fa-times"></i></button>
            </div>
            <div class="p-2 border-b bg-white">
                <input type="text" id="search-history" placeholder="履歴を検索..." class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary text-sm">
            </div>
            <div id="history-list" class="flex-1 overflow-y-auto p-2 space-y-2 hide-scrollbar">
                <!-- History items will be injected here -->
            </div>
            <div class="p-4 border-t bg-white grid grid-cols-2 gap-2 text-sm">
                <button id="btn-new-chat" class="col-span-2 bg-primary text-white py-2 rounded-lg font-bold shadow hover:bg-blue-600 transition"><i class="fas fa-plus mr-1"></i> 新規チャット</button>
                <button id="btn-export-data" class="bg-gray-200 text-gray-700 py-2 rounded-lg hover:bg-gray-300 transition"><i class="fas fa-download mr-1"></i> Export</button>
                <button id="btn-import-data" class="bg-gray-200 text-gray-700 py-2 rounded-lg hover:bg-gray-300 transition"><i class="fas fa-upload mr-1"></i> Import</button>
                <input type="file" id="file-import" class="hidden" accept=".json">
            </div>
        </aside>

        <!-- Chat View -->
        <main id="chat-view" class="flex-1 flex flex-col bg-white relative w-full">
            <!-- Active Settings Info -->
            <div class="bg-blue-50/50 border-b px-4 py-1.5 flex justify-between items-center text-xs text-gray-500">
                <div class="flex gap-3 truncate">
                    <span><i class="fas fa-robot mr-1"></i> <span id="current-model-display">Gemini-2.5-flash</span></span>
                    <span><i class="fas fa-user-tag mr-1"></i> <span id="current-role-display">デフォルト</span></span>
                </div>
                <div class="flex items-center gap-2">
                    <span id="auto-tweet-status" class="hidden text-twitter font-bold" title="自動投稿有効"><i class="fab fa-twitter"></i> Auto</span>
                    <button id="btn-save-file" class="hover:text-primary transition" title="ローカルファイルに保存"><i class="fas fa-save"></i></button>
                </div>
            </div>

            <!-- Messages Area -->
            <div id="messages-container" class="flex-1 overflow-y-auto p-4 space-y-6 pb-20 hide-scrollbar scroll-smooth">
                <div class="flex justify-center mt-10">
                    <div class="text-center text-gray-400">
                        <i class="fas fa-comment-dots text-4xl mb-3"></i>
                        <p>メッセージを入力して会話を始めましょう。</p>
                        <p class="text-xs mt-2">※初回利用時は右上の⚙️からAPIキーを設定してください。</p>
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="bg-white border-t p-3 pb-safe shrink-0">
                <div class="flex items-end gap-2 bg-gray-50 border rounded-2xl p-1 focus-within:ring-2 focus-within:ring-primary focus-within:border-transparent transition-all shadow-sm">
                    <textarea id="chat-input" rows="1" class="w-full bg-transparent border-none focus:ring-0 resize-none py-2 px-3 text-gray-800 hide-scrollbar" placeholder="メッセージを入力..."></textarea>
                    <div class="flex pb-1 pr-1 gap-1">
                        <button id="btn-manual-tweet" class="p-2 text-twitter hover:bg-blue-100 rounded-full transition-colors" title="手動でツイート作成"><i class="fab fa-twitter"></i></button>
                        <button id="btn-send" class="p-2 bg-primary text-white rounded-full hover:bg-blue-600 transition-colors shadow-sm disabled:opacity-50"><i class="fas fa-paper-plane px-1"></i></button>
                    </div>
                </div>
            </div>
        </main>

        <!-- Settings View (Overlay/Slide-in) -->
        <section id="settings-view" class="absolute inset-0 bg-gray-50 z-30 transform translate-x-full transition-transform duration-300 flex flex-col hidden-if-uninitialized">
            <div class="p-4 border-b bg-white flex justify-between items-center shrink-0">
                <h2 class="text-xl font-bold text-gray-800"><i class="fas fa-cog mr-2"></i>設定</h2>
                <button id="btn-settings-close" class="text-gray-500 hover:text-red-500 p-2 text-xl rounded-full"><i class="fas fa-arrow-right"></i></button>
            </div>
            
            <div class="flex-1 overflow-y-auto p-4 space-y-8 hide-scrollbar">
                
                <!-- Current Session Settings -->
                <div class="bg-white p-4 rounded-xl shadow-sm border">
                    <h3 class="font-bold text-gray-700 border-b pb-2 mb-4">現在のチャット設定</h3>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm text-gray-600 mb-1">使用モデル</label>
                            <select id="sel-active-model" class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-primary outline-none"></select>
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-1">役割 (システムプロンプト)</label>
                            <select id="sel-active-role" class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-primary outline-none"></select>
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-1">プロフィール (ペルソナ)</label>
                            <select id="sel-active-profile" class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-primary outline-none"></select>
                        </div>
                    </div>
                </div>

                <!-- API Keys -->
                <div class="bg-white p-4 rounded-xl shadow-sm border">
                    <h3 class="font-bold text-gray-700 border-b pb-2 mb-4">APIキー設定 <span class="text-xs text-red-500 font-normal ml-2">※端末内に安全に保存</span></h3>
                    <div class="space-y-3" id="api-keys-container"></div>
                </div>

                <!-- Twitter Accounts -->
                <div class="bg-white p-4 rounded-xl shadow-sm border">
                    <div class="flex justify-between items-center border-b pb-2 mb-4">
                        <h3 class="font-bold text-twitter"><i class="fab fa-twitter mr-1"></i> X (Twitter) 連携</h3>
                        <button id="btn-add-twitter" class="text-xs bg-twitter text-white px-2 py-1 rounded hover:bg-blue-500"><i class="fas fa-plus"></i> 追加</button>
                    </div>
                    <div id="twitter-accounts-list" class="space-y-3 mb-3"></div>
                </div>

                <!-- Models Management -->
                <div class="bg-white p-4 rounded-xl shadow-sm border">
                    <div class="flex justify-between items-center border-b pb-2 mb-4">
                        <h3 class="font-bold text-gray-700">カスタムモデル</h3>
                        <button id="btn-add-model" class="text-xs bg-gray-200 text-gray-700 px-2 py-1 rounded hover:bg-gray-300"><i class="fas fa-plus"></i> 追加</button>
                    </div>
                    <div id="models-list" class="space-y-2"></div>
                </div>

                <!-- Roles Management -->
                <div class="bg-white p-4 rounded-xl shadow-sm border">
                    <div class="flex justify-between items-center border-b pb-2 mb-4">
                        <h3 class="font-bold text-gray-700">役割 (システムプロンプト)</h3>
                        <button id="btn-add-role" class="text-xs bg-gray-200 text-gray-700 px-2 py-1 rounded hover:bg-gray-300"><i class="fas fa-plus"></i> 追加</button>
                    </div>
                    <div id="roles-list" class="space-y-3"></div>
                </div>

                <!-- Profile Management -->
                <div class="bg-white p-4 rounded-xl shadow-sm border mb-8">
                    <div class="flex justify-between items-center border-b pb-2 mb-4">
                        <h3 class="font-bold text-gray-700">プロフィール管理 (ペルソナ)</h3>
                        <button id="btn-add-profile" class="text-xs bg-gray-200 text-gray-700 px-2 py-1 rounded hover:bg-gray-300"><i class="fas fa-plus"></i> 追加</button>
                    </div>
                    <div id="profiles-list" class="space-y-3"></div>
                </div>
            </div>
        </section>

    </div>

    <!-- Twitter Post Modal -->
    <div id="tweet-modal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center hidden opacity-0 transition-opacity">
        <div class="bg-white rounded-2xl w-11/12 max-w-md shadow-2xl transform scale-95 transition-transform duration-200 p-5 flex flex-col max-h-[90vh]">
            <div class="flex justify-between items-center mb-4 shrink-0">
                <h3 class="font-bold text-lg text-gray-800"><i class="fab fa-twitter text-twitter mr-1"></i> ツイートを投稿</h3>
                <button id="btn-close-tweet-modal" class="text-gray-400 hover:text-gray-600 text-xl"><i class="fas fa-times"></i></button>
            </div>
            
            <div class="overflow-y-auto hide-scrollbar flex-1 -mx-2 px-2">
                <label class="block text-sm text-gray-600 mb-1">投稿先アカウント</label>
                <select id="sel-tweet-account" class="w-full border rounded-lg p-2 mb-4 focus:ring-2 focus:ring-twitter outline-none shrink-0"></select>
                
                <!-- AI生成用トリガー -->
                <div class="bg-blue-50 p-3 rounded-lg border mb-4 shrink-0">
                    <label class="block text-sm text-gray-700 font-bold mb-1"><i class="fas fa-magic text-primary mr-1"></i> AIにツイート案を作成させる</label>
                    <p class="text-xs text-gray-500 mb-2">ニュースURL、今の出来事、考えなどを入力してください</p>
                    <textarea id="tweet-trigger-input" rows="2" class="w-full border rounded p-2 text-sm focus:ring-2 focus:ring-primary outline-none resize-none mb-2" placeholder="例: 今日のランチで行ったイタリアンが美味しかった。"></textarea>
                    <button id="btn-ai-generate-tweet" class="w-full bg-primary text-white text-sm py-2 rounded-lg hover:bg-blue-600 transition-colors shadow-sm font-bold flex justify-center items-center">
                        <i class="fas fa-robot mr-1"></i> ツイート案を生成
                    </button>
                </div>

                <label class="block text-sm text-gray-600 mb-1">内容 (編集可能)</label>
                <textarea id="tweet-content" rows="4" class="w-full border rounded-lg p-3 focus:ring-2 focus:ring-twitter outline-none resize-none mb-2 shrink-0" placeholder="いまどうしてる？"></textarea>
                <div class="flex justify-between items-center text-sm text-gray-500 mb-4 shrink-0">
                    <span id="tweet-length">0 / 280</span>
                </div>
            </div>
            
            <button id="btn-execute-tweet" class="w-full bg-twitter text-white font-bold py-3 rounded-full hover:bg-blue-500 transition-colors shadow-md flex justify-center items-center shrink-0 mt-2">
                <span>投稿する</span>
            </button>
        </div>
    </div>

    <!-- Profile Management Modal -->
    <div id="profile-modal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center hidden opacity-0 transition-opacity">
        <div class="bg-white rounded-xl w-11/12 max-w-2xl shadow-xl flex flex-col max-h-[90vh] transform scale-95 transition-transform duration-200">
            <div class="p-4 border-b flex justify-between items-center shrink-0">
                <h3 class="font-bold text-lg text-gray-800"><i class="fas fa-id-card mr-2 text-primary"></i>プロフィールの編集</h3>
                <button id="btn-close-profile-modal" class="text-gray-400 hover:text-gray-600 text-xl"><i class="fas fa-times"></i></button>
            </div>
            <div class="p-3 border-b bg-blue-50 shrink-0 flex justify-between items-center">
                 <span class="text-xs text-gray-600">入力内容を元にAIが残りを自動生成します</span>
                 <button id="btn-ai-generate-profile" class="bg-primary text-white text-xs px-3 py-1.5 rounded-full hover:bg-blue-600 transition shadow-sm font-bold flex items-center"><i class="fas fa-magic mr-1"></i>AI自動入力</button>
            </div>
            <div id="profile-form-container" class="p-4 overflow-y-auto space-y-4 flex-1 hide-scrollbar bg-white">
                <!-- Injected via JS -->
            </div>
            <div class="p-4 border-t flex justify-end gap-2 shrink-0 bg-gray-50 rounded-b-xl">
                <button id="btn-cancel-profile" class="px-4 py-2 text-gray-600 bg-gray-200 rounded-lg hover:bg-gray-300 font-medium transition-colors">キャンセル</button>
                <button id="btn-save-profile" class="px-4 py-2 text-white bg-primary rounded-lg hover:bg-blue-600 font-medium transition-colors shadow">保存</button>
            </div>
        </div>
    </div>

    <!-- Generic Modal (Add Model/Role etc) -->
    <div id="generic-modal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center hidden opacity-0 transition-opacity">
        <div class="bg-white rounded-xl w-11/12 max-w-sm shadow-xl p-5">
            <h3 id="gm-title" class="font-bold text-lg mb-4"></h3>
            <div id="gm-content" class="space-y-3"></div>
            <div class="flex justify-end gap-2 mt-5">
                <button id="btn-gm-cancel" class="px-4 py-2 text-gray-600 bg-gray-100 rounded-lg hover:bg-gray-200">キャンセル</button>
                <button id="btn-gm-save" class="px-4 py-2 text-white bg-primary rounded-lg hover:bg-blue-600">保存</button>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed bottom-20 left-1/2 z-50 flex flex-col gap-2 pointer-events-none"></div>

    <script>
        /**
         * System Constants & State
         */
        const DB_NAME = 'AIChatTweetDB';
        const DB_VERSION = 1;
        
        let db;
        let activeThreadId = null;
        let isGenerating = false;
        let wakeLock = null;
        let aiWorker = null;

        const defaultModels = [
            { id: 'gemini-2.5-flash', name: 'Gemini 2.5 Flash', provider: 'google' },
            { id: 'gpt-4o', name: 'GPT-4o', provider: 'openai' },
            { id: 'claude-3-opus-20240229', name: 'Claude 3 Opus', provider: 'anthropic' }
        ];

        const defaultRoles = [
            { id: 'default', name: 'デフォルト', prompt: 'あなたは優秀なAIアシスタントです。簡潔かつ正確に答えてください。' },
            { id: 'sns_writer', name: 'SNSライター', prompt: 'あなたはバズるSNS投稿を作成するプロのライターです。短く、絵文字を活用し、ハッシュタグを適度に含めてください。' }
        ];

        const defaultProfiles = [
            { id: 'none', name: '使用しない (無効)' }
        ];

        // プロフィール定義マッピング
        const profileFields = {
            basic: {
                label: '基本情報',
                fields: [
                    { id: 'fullName', label: '氏名', type: 'text' }, { id: 'nickname', label: 'ニックネーム', type: 'text' },
                    { id: 'gender', label: '性別', type: 'text' }, { id: 'sexualOrientation', label: '性指向 (秘匿)', type: 'text' },
                    { id: 'birthDate', label: '生年月日', type: 'text' }, { id: 'birthPlace', label: '出生地', type: 'text' },
                    { id: 'residence', label: '居住地', type: 'text' }, { id: 'education', label: '学歴', type: 'text' },
                    { id: 'occupation', label: '職業', type: 'text' }, { id: 'income', label: '年収', type: 'text' },
                    { id: 'commuteRoute', label: '通勤経路', type: 'text' }, { id: 'financialSense', label: '金銭感覚', type: 'text' }
                ]
            },
            mind: {
                label: '思考・興味関心',
                fields: [
                    { id: 'thinkingStyle', label: '思考様式', type: 'textarea' }, { id: 'interests', label: '興味関心領域', type: 'textarea' },
                    { id: 'values', label: '価値観', type: 'textarea' }, { id: 'languages', label: '言語（複数可）', type: 'text' }
                ]
            },
            lifestyle: {
                label: '行動様式・生活スタイル',
                fields: [
                    { id: 'personality', label: '性格', type: 'textarea' }, { id: 'behaviorPattern', label: '行動様式', type: 'textarea' },
                    { id: 'lifestyle', label: '生活スタイル', type: 'textarea' }, { id: 'lifeCycle', label: 'ライフサイクル', type: 'textarea' },
                    { id: 'dailyFlow', label: '一日の流れ', type: 'textarea' }, { id: 'dailySchedule', label: 'タイムスケジュール', type: 'textarea' },
                    { id: 'recentSchedule', label: '直近のスケジュール', type: 'textarea' }, { id: 'otherValues', label: 'その他の価値観', type: 'textarea' }
                ]
            }
        };

        const state = {
            keys: { google: '', openai: '', anthropic: '' },
            models: [], roles: [], profiles: [], twitterAccounts: [],
            activeModelId: 'gemini-2.5-flash', activeRoleId: 'default', activeProfileId: 'none'
        };

        /**
         * UI Elements
         */
        const els = {
            chatView: document.getElementById('chat-view'), settingsView: document.getElementById('settings-view'),
            sidebar: document.getElementById('sidebar'), chatInput: document.getElementById('chat-input'),
            btnSend: document.getElementById('btn-send'), messagesContainer: document.getElementById('messages-container'),
            toastContainer: document.getElementById('toast-container'), genericModal: document.getElementById('generic-modal'),
            tweetModal: document.getElementById('tweet-modal'), profileModal: document.getElementById('profile-modal')
        };

        /**
         * Initialization
         */
        async function init() {
            setupTextareaAutoResize();
            await initDB();
            await loadSettings();
            setupEventListeners();
            createNewThreadIfNeeded();
            renderSettingsUI();
            updateChatHeader();
            loadHistoryList();
            initWebWorker();
        }

        /**
         * Database (IndexedDB)
         */
        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains('settings')) db.createObjectStore('settings');
                    if (!db.objectStoreNames.contains('history')) db.createObjectStore('history', { keyPath: 'id' });
                };
                request.onsuccess = (e) => { db = e.target.result; resolve(); };
                request.onerror = (e) => reject(e);
            });
        }
        async function dbGet(storeName, key) { return new Promise((r, j) => { const req = db.transaction(storeName, 'readonly').objectStore(storeName).get(key); req.onsuccess=()=>r(req.result); req.onerror=()=>j(req.error); }); }
        async function dbPut(storeName, key, value) { return new Promise((r, j) => { const req = db.transaction(storeName, 'readwrite').objectStore(storeName).put(value, key); req.onsuccess=()=>r(); req.onerror=()=>j(req.error); }); }
        async function dbGetAll(storeName) { return new Promise((r, j) => { const req = db.transaction(storeName, 'readonly').objectStore(storeName).getAll(); req.onsuccess=()=>r(req.result); req.onerror=()=>j(req.error); }); }
        async function dbDelete(storeName, key) { return new Promise((r, j) => { const req = db.transaction(storeName, 'readwrite').objectStore(storeName).delete(key); req.onsuccess=()=>r(); req.onerror=()=>j(req.error); }); }

        async function loadSettings() {
            state.keys = await dbGet('settings', 'keys') || state.keys;
            state.models = await dbGet('settings', 'models') || defaultModels;
            state.roles = await dbGet('settings', 'roles') || defaultRoles;
            state.profiles = await dbGet('settings', 'profiles') || defaultProfiles;
            state.twitterAccounts = await dbGet('settings', 'twitter') || [];

            const prefs = await dbGet('settings', 'prefs') || {};
            state.activeModelId = prefs.activeModelId || state.models[0]?.id;
            state.activeRoleId = prefs.activeRoleId || state.roles[0]?.id;
            state.activeProfileId = prefs.activeProfileId || state.profiles[0]?.id;
        }

        async function saveSettings() {
            await dbPut('settings', 'keys', state.keys);
            await dbPut('settings', 'models', state.models);
            await dbPut('settings', 'roles', state.roles);
            await dbPut('settings', 'profiles', state.profiles);
            await dbPut('settings', 'twitter', state.twitterAccounts);
            await dbPut('settings', 'prefs', { activeModelId: state.activeModelId, activeRoleId: state.activeRoleId, activeProfileId: state.activeProfileId });
        }

        /**
         * Web Worker for AI Generation (Added 'context' handling for Profile Gen & Tweet Gen)
         */
        function initWebWorker() {
            const workerCode = `
                self.onmessage = async function(e) {
                    const { provider, apiKey, model, messages, systemPrompt, context } = e.data;
                    try {
                        if(provider === 'google') await handleGoogle(apiKey, model, messages, systemPrompt, context);
                        else if(provider === 'openai') await handleOpenAI(apiKey, model, messages, systemPrompt, context);
                        else throw new Error('Unsupported provider');
                    } catch(err) {
                        self.postMessage({ type: 'error', error: err.message, context });
                    }
                };

                async function handleGoogle(key, model, messages, sysPrompt, context) {
                    const url = \`https://generativelanguage.googleapis.com/v1beta/models/\${model}:streamGenerateContent?key=\${key}\`;
                    const contents = messages.map(m => ({ role: m.role === 'ai' ? 'model' : 'user', parts: [{ text: m.content }] }));
                    const body = { contents, systemInstruction: sysPrompt ? { parts: [{ text: sysPrompt }] } : undefined };

                    const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
                    if(!response.ok) throw new Error('API Error: ' + response.statusText);

                    const reader = response.body.getReader();
                    const decoder = new TextDecoder("utf-8");
                    while (true) {
                        const { value, done } = await reader.read();
                        if(done) break;
                        if (value) {
                            const chunk = decoder.decode(value, { stream: true });
                            const matches = chunk.match(/"text":\\s*"([^"]+)"/g);
                            if(matches) {
                                for(const match of matches) {
                                     try { self.postMessage({ type: 'chunk', chunk: JSON.parse('{' + match + '}').text, context }); } catch(e){}
                                }
                            }
                        }
                    }
                    self.postMessage({ type: 'done', context });
                }

                async function handleOpenAI(key, model, messages, sysPrompt, context) {
                    const url = 'https://api.openai.com/v1/chat/completions';
                    const reqMessages = [];
                    if(sysPrompt) reqMessages.push({role: 'system', content: sysPrompt});
                    messages.forEach(m => reqMessages.push({role: m.role==='ai'?'assistant':'user', content: m.content}));

                    const response = await fetch(url, {
                        method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': \`Bearer \${key}\` },
                        body: JSON.stringify({ model: model, messages: reqMessages, stream: true })
                    });
                    
                    if(!response.ok) throw new Error('API Error: ' + response.statusText);
                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();
                    while(true) {
                        const { done, value } = await reader.read();
                        if(done) break;
                        const chunk = decoder.decode(value);
                        const lines = chunk.split('\\n').filter(line => line.trim() !== '');
                        for (const line of lines) {
                            if (line.includes('[DONE]')) break;
                            if (line.startsWith('data: ')) {
                                try {
                                    const data = JSON.parse(line.slice(6));
                                    if(data.choices[0].delta.content) self.postMessage({ type: 'chunk', chunk: data.choices[0].delta.content, context });
                                } catch(e){}
                            }
                        }
                    }
                    self.postMessage({ type: 'done', context });
                }
            `;
            const blob = new Blob([workerCode], { type: 'application/javascript' });
            aiWorker = new Worker(URL.createObjectURL(blob));
            
            aiWorker.onmessage = (e) => {
                const data = e.data;
                if(data.context === 'profile') {
                    if(data.type === 'chunk') profileGenBuffer += data.chunk;
                    else if(data.type === 'done') finishProfileGeneration();
                    else if(data.type === 'error') { showToast('AI通信エラー: ' + data.error, 'error'); resetProfileGenUI(); }
                } else if(data.context === 'tweet') {
                    if(data.type === 'chunk') { tweetGenBuffer += data.chunk; document.getElementById('tweet-content').value = tweetGenBuffer; updateTweetLength(); }
                    else if(data.type === 'done') finishTweetGeneration();
                    else if(data.type === 'error') { showToast('AI通信エラー: ' + data.error, 'error'); resetTweetGenUI(); }
                } else {
                    if(data.type === 'chunk') appendChunkToLastMessage(data.chunk);
                    else if(data.type === 'done') finishGeneration();
                    else if(data.type === 'error') { showToast('AI通信エラー: ' + data.error, 'error'); finishGeneration(true); }
                }
            };
        }

        function buildProfilePrompt(profile) {
            if (!profile || profile.id === 'none') return '';
            let text = '\n\n【ペルソナ（人物像）設定】\nあなたは以下の詳細なプロフィールを持つ人物です。この設定を厳密に守り、発言やツイート内容に反映させてください。\n';
            for(const cat in profileFields) {
                text += `\n[${profileFields[cat].label}]\n`;
                profileFields[cat].fields.forEach(f => {
                    if(profile[cat] && profile[cat][f.id]) text += `- ${f.label}: ${profile[cat][f.id]}\n`;
                });
            }
            return text;
        }

        async function handleSend() {
            if(isGenerating) return;
            const text = els.chatInput.value.trim();
            if(!text) return;

            els.chatInput.value = ''; els.chatInput.style.height = 'auto';
            await createNewThreadIfNeeded();
            
            const thread = await dbGet('history', activeThreadId);
            const messages = thread ? thread.messages : [];
            messages.push({ role: 'user', content: text, timestamp: Date.now() });
            renderMessage('user', text, true);
            await saveCurrentThread(messages);

            const modelObj = state.models.find(m => m.id === state.activeModelId) || state.models[0];
            const roleObj = state.roles.find(r => r.id === state.activeRoleId);
            const profileObj = state.profiles.find(p => p.id === state.activeProfileId);
            const apiKey = state.keys[modelObj.provider];

            let systemPrompt = roleObj ? roleObj.prompt : '';
            if (profileObj) systemPrompt += buildProfilePrompt(profileObj);

            startGenerationUI();
            aiWorker.postMessage({ provider: modelObj.provider, apiKey, model: modelObj.id, messages, systemPrompt, context: 'chat' });

        function appendChunkToLastMessage(chunk) {

        async function finishGeneration(isError = false) {

            if(wakeLock) { wakeLock.release(); wakeLock = null; }

            if(indicator) indicator.remove();

            if(!isError && currentAiText) {
                const thread = await dbGet('history', activeThreadId);

        function renderMessage(role, content, animate = false, isLoading = false) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex w-full ${role === 'user' ? 'justify-end' : 'justify-start'} ${animate ? 'slide-in' : ''}`;
            const bubble = document.createElement('div');
            bubble.className = `max-w-[85%] md:max-w-[75%] rounded-2xl p-3 shadow-sm ${role === 'user' ? 'bg-primary text-white rounded-br-none' : 'bg-white border text-gray-800 rounded-bl-none prose prose-sm md:prose-base markdown-body'}`;
            if(isLoading && !content) bubble.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
            else bubble.innerHTML = role === 'user' ? escapeHTML(content).replace(/\n/g, '<br>') : marked.parse(content);

            return wrapper;

                const cleanJson = profileGenBuffer.replace(/```json/gi, '').replace(/```/g, '').trim();

        }
        async function deleteHistory(id) {
            if(confirm('削除しますか？')) { await dbDelete('history', id); if(activeThreadId === id) { activeThreadId = null; await createNewThreadIfNeeded(); } loadHistoryList(); }
        }

        /**
         * Settings UI Rendering
         */
        function renderSettingsUI() {
            document.getElementById('sel-active-model').innerHTML = state.models.map(m => `<option value="${m.id}" ${m.id===state.activeModelId?'selected':''}>${m.name} (${m.provider})</option>`).join('');
            document.getElementById('sel-active-role').innerHTML = state.roles.map(r => `<option value="${r.id}" ${r.id===state.activeRoleId?'selected':''}>${r.name}</option>`).join('');
            document.getElementById('sel-active-profile').innerHTML = state.profiles.map(p => `<option value="${p.id}" ${p.id===state.activeProfileId?'selected':''}>${p.name}</option>`).join('');

            document.getElementById('api-keys-container').innerHTML = ['google', 'openai', 'anthropic'].map(provider => `<div><label class="block text-xs text-gray-500 mb-1 capitalize">${provider} API Key</label><input type="password" data-key="${provider}" value="${state.keys[provider] || ''}" class="w-full border rounded-lg p-2 text-sm focus:ring-2 focus:ring-primary outline-none api-key-input" placeholder="sk-..."></div>`).join('');
            
            document.getElementById('twitter-accounts-list').innerHTML = state.twitterAccounts.map((a, i) => `<div class="flex flex-col border rounded p-2 text-sm bg-gray-50 relative"><div class="flex justify-between items-center mb-1"><span class="font-bold">@${a.name}</span><button class="text-red-400 hover:text-red-600" onclick="removeTwitter(${i})"><i class="fas fa-times"></i></button></div><select class="border rounded p-1 mb-1 bg-white tw-mode" data-idx="${i}"><option value="manual" ${a.mode==='manual'?'selected':''}>手動確認して投稿</option><option value="auto" ${a.mode==='auto'?'selected':''}>AI生成完了時に自動投稿</option></select></div>`).join('');
            
            document.getElementById('models-list').innerHTML = state.models.map((m, i) => `<div class="flex justify-between items-center bg-gray-50 p-2 rounded border text-sm"><span>${m.name} <span class="text-xs text-gray-400 ml-1">${m.provider}</span></span>${i > 2 ? `<button class="text-red-400" onclick="removeModel(${i})"><i class="fas fa-trash"></i></button>` : ''}</div>`).join('');
            
            document.getElementById('roles-list').innerHTML = state.roles.map((r, i) => `<div class="bg-gray-50 p-2 rounded border text-sm relative group pr-8"><div class="font-bold">${r.name}</div><div class="text-xs text-gray-500 truncate">${r.prompt}</div>${i > 0 ? `<button class="absolute right-2 top-1/2 -translate-y-1/2 text-red-400 opacity-0 group-hover:opacity-100 transition" onclick="removeRole(${i})"><i class="fas fa-trash"></i></button>` : ''}</div>`).join('');

            document.getElementById('profiles-list').innerHTML = state.profiles.map((p, i) => `
                <div class="bg-gray-50 p-3 rounded-lg border text-sm relative group pr-16 mb-2 flex flex-col shadow-sm">
                    <div class="font-bold text-gray-800 truncate">${escapeHTML(p.name)}</div>
                    <div class="text-xs text-gray-500 mt-1 truncate">${p.id === 'none' ? 'ペルソナ情報を付与しません' : '基本・思考・ライフスタイル情報'}</div>
                    ${p.id !== 'none' ? `
                    <div class="absolute right-2 top-1/2 -translate-y-1/2 opacity-0 group-hover:opacity-100 transition flex gap-3 bg-gray-50 pl-2">
                        <button class="text-primary hover:text-blue-700" onclick="editProfile('${p.id}')"><i class="fas fa-edit"></i></button>
                        <button class="text-red-400 hover:text-red-600" onclick="removeProfile('${p.id}')"><i class="fas fa-trash"></i></button>
                    </div>
                    ` : ''}
                </div>
            `).join('');
        }

        // Settings Listeners
        els.settingsView.addEventListener('change', async (e) => {
            if(e.target.id === 'sel-active-model') state.activeModelId = e.target.value;
            if(e.target.id === 'sel-active-role') state.activeRoleId = e.target.value;
            if(e.target.id === 'sel-active-profile') state.activeProfileId = e.target.value;
            if(e.target.classList.contains('tw-mode')) state.twitterAccounts[e.target.dataset.idx].mode = e.target.value;
            saveSettings();
        });
        els.settingsView.addEventListener('input', (e) => {
            if(e.target.classList.contains('api-key-input')) { state.keys[e.target.dataset.key] = e.target.value.trim(); saveSettings(); }
        });

        // Add Handlers
        document.getElementById('btn-add-twitter').addEventListener('click', () => { showGenericModal('Twitter追加', `<input type="text" id="gm-tw-name" placeholder="アカウント表示名" class="w-full border p-2 rounded mb-2"><input type="password" id="gm-tw-token" placeholder="Bearer Token" class="w-full border p-2 rounded mb-2">`, () => { const name = document.getElementById('gm-tw-name').value.trim(); const token = document.getElementById('gm-tw-token').value.trim(); if(name && token) { state.twitterAccounts.push({ id: 'tw_'+Date.now(), name, token, mode: 'manual' }); saveSettings(); renderSettingsUI(); closeGenericModal(); } }); }); window.removeTwitter = (idx) => { state.twitterAccounts.splice(idx,1); saveSettings(); renderSettingsUI(); };
        document.getElementById('btn-add-model').addEventListener('click', () => { showGenericModal('モデル追加', `<input type="text" id="gm-mod-id" placeholder="モデルID" class="w-full border p-2 rounded mb-2"><input type="text" id="gm-mod-name" placeholder="表示名" class="w-full border p-2 rounded mb-2"><select id="gm-mod-prov" class="w-full border p-2 rounded mb-2"><option value="openai">OpenAI</option><option value="google">Google</option><option value="anthropic">Anthropic</option></select>`, () => { const id = document.getElementById('gm-mod-id').value.trim(); const name = document.getElementById('gm-mod-name').value.trim(); const provider = document.getElementById('gm-mod-prov').value; if(id && name) { state.models.push({id, name, provider}); saveSettings(); renderSettingsUI(); closeGenericModal(); } }); }); window.removeModel = (idx) => { state.models.splice(idx,1); saveSettings(); renderSettingsUI(); };
        document.getElementById('btn-add-role').addEventListener('click', () => { showGenericModal('役割追加', `<input type="text" id="gm-role-name" placeholder="役割名" class="w-full border p-2 rounded mb-2"><textarea id="gm-role-prompt" placeholder="システムプロンプト..." class="w-full border p-2 rounded h-24 resize-none"></textarea>`, () => { const name = document.getElementById('gm-role-name').value.trim(); const prompt = document.getElementById('gm-role-prompt').value.trim(); if(name && prompt) { state.roles.push({id:'r_'+Date.now(), name, prompt}); saveSettings(); renderSettingsUI(); closeGenericModal(); } }); }); window.removeRole = (idx) => { state.roles.splice(idx,1); saveSettings(); renderSettingsUI(); };
        
        // Profile Modal Handlers
        document.getElementById('btn-add-profile').addEventListener('click', () => openProfileModal());
        window.editProfile = (id) => openProfileModal(id);
        window.removeProfile = (id) => { if(confirm('プロフィールを削除しますか？')) { state.profiles = state.profiles.filter(p => p.id !== id); if(state.activeProfileId === id) state.activeProfileId = 'none'; saveSettings(); renderSettingsUI(); } };
        document.getElementById('btn-close-profile-modal').addEventListener('click', closeProfileModal);
        document.getElementById('btn-cancel-profile').addEventListener('click', closeProfileModal);
        document.getElementById('btn-save-profile').addEventListener('click', saveProfileForm);
        document.getElementById('btn-ai-generate-profile').addEventListener('click', handleAIGenerateProfile);

        // Generic Modal
        let gmSaveCallback = null;
        function showGenericModal(title, contentHTML, onSave) { document.getElementById('gm-title').innerText = title; document.getElementById('gm-content').innerHTML = contentHTML; gmSaveCallback = onSave; els.genericModal.classList.remove('hidden'); setTimeout(()=>els.genericModal.classList.remove('opacity-0'), 10); }
        function closeGenericModal() { els.genericModal.classList.add('opacity-0'); setTimeout(()=>els.genericModal.classList.add('hidden'), 200); }
        document.getElementById('btn-gm-cancel').addEventListener('click', closeGenericModal); document.getElementById('btn-gm-save').addEventListener('click', () => { if(gmSaveCallback) gmSaveCallback(); });

        /**
         * Setup Event Listeners
         */
        function setupEventListeners() {
            document.getElementById('btn-sidebar-toggle').addEventListener('click', toggleSidebar); document.getElementById('btn-sidebar-close').addEventListener('click', toggleSidebar);
            document.getElementById('btn-settings-toggle').addEventListener('click', toggleSettings); document.getElementById('btn-settings-close').addEventListener('click', toggleSettings);
            els.btnSend.addEventListener('click', handleSend);
            els.chatInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if(!isGenerating) handleSend(); } });
            document.getElementById('btn-new-chat').addEventListener('click', () => { activeThreadId = null; createNewThreadIfNeeded(); if(window.innerWidth < 768) toggleSidebar(); });
            document.getElementById('search-history').addEventListener('input', (e) => { const q = e.target.value.toLowerCase(); Array.from(document.getElementById('history-list').children).forEach(item => { item.style.display = item.innerText.toLowerCase().includes(q) ? 'flex' : 'none'; }); });
            document.getElementById('btn-save-file').addEventListener('click', handleSaveFile);
            
            // Twitter Modal
            document.getElementById('btn-manual-tweet').addEventListener('click', () => { let lastText = ''; const bubbles = els.messagesContainer.querySelectorAll('.markdown-body'); if(bubbles.length > 0) lastText = bubbles[bubbles.length-1].innerText; openTweetModal(lastText); });
            document.getElementById('btn-close-tweet-modal').addEventListener('click', closeTweetModal); 
            document.getElementById('tweet-content').addEventListener('input', updateTweetLength); 
            document.getElementById('btn-execute-tweet').addEventListener('click', handleExecuteTweet);
            document.getElementById('btn-ai-generate-tweet').addEventListener('click', handleAIGenerateTweet);
            
            // Import / Export
            document.getElementById('btn-export-data').addEventListener('click', async () => { const a = document.createElement('a'); a.href = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(await dbGetAll('history'))); a.download = "aichat_backup.json"; a.click(); });
            document.getElementById('btn-import-data').addEventListener('click', () => document.getElementById('file-import').click());
            document.getElementById('file-import').addEventListener('change', (e) => { const file = e.target.files[0]; if(!file) return; const reader = new FileReader(); reader.onload = async (e) => { try { const data = JSON.parse(e.target.result); if(Array.isArray(data)) { for(const item of data) if(item.id && item.messages) await dbPut('history', item.id, item); loadHistoryList(); showToast('インポートしました'); } }catch(err){ showToast('無効なファイル', 'error'); } }; reader.readAsText(file); });
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
